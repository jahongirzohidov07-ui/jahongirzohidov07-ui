name: Generate Snake Animation
"on": {schedule: [{cron: "0 0 * * *"}], workflow_dispatch: {}, push: {branches: [main]}}
jobs: {generate: {permissions: {contents: write}, runs-on: ubuntu-latest, steps: [{name: "Generate snake animation", uses: "Platane/snk@v3", id: "snake-gif", with: {github_user_name: "${{ github.repository_owner }}", outputs: "dist/snake.svg\ndist/snake-dark.svg?palette=github-dark\ndist/snake.gif?color_snake=#8E2DE2&color_dots=#4A00E0,#4A00E0,#00C9FF,#00C9FF,#00C9FF"}}, {name: "Push snake animation to output branch", uses: "crazy-max/ghaction-github-pages@v4", with: {target_branch: output, build_dir: dist}, env: {GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"}}]}}
